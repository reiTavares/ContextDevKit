name: Release

# Publishes to npm when a version tag (v*) is pushed.
#
# One-time setup: add a repo secret NPM_TOKEN
#   GitHub → Settings → Secrets and variables → Actions → New repository secret
#   Name: NPM_TOKEN
#   Value: an npm "Automation" / granular token with publish rights (bypass 2FA)
#
# To cut a release:
#   1. bump "version" in package.json
#   2. git commit -am "chore(release): vX.Y.Z"
#   3. git tag vX.Y.Z && git push && git push --tags
# The workflow runs the test suite, then `npm publish`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the GitHub Release
  id-token: write # needed for npm publish --provenance (build attestation) [ADR-0031]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # The publish path runs the SAME gate as CI [ADR-0031] — a release can no
      # longer ship on a red gate (the v1.9.0 mistake). One source: `npm run ci`.
      - name: CI gate (npm run ci)
        run: npm run ci

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
