name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: CI only needs to read the repo. Any job that needs
# more must opt in explicitly.
permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}

      - name: Self-check (static engine smoke test)
        run: node tools/selfcheck.mjs

      - name: Integration test (real hooks, end-to-end)
        run: node tools/integration-test.mjs

      - name: Tech-debt gate (kit must pass its own constitution — no RED zone)
        run: node templates/contextkit/tools/scripts/tech-debt-scan.mjs --ci

      - name: Installer dry sanity (greenfield install)
        run: |
          mkdir -p /tmp/context-greenfield
          git -C /tmp/context-greenfield init -b main
          node install.mjs --target /tmp/context-greenfield --level 3 --name "CI Greenfield" --mode greenfield --yes
          test -f /tmp/context-greenfield/CLAUDE.md
          test -f /tmp/context-greenfield/contextkit/config.json
          test -f /tmp/context-greenfield/.claude/settings.json
