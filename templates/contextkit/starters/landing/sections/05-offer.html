<!-- Fold 5 — OFFER / PRICING. Clear scope + value anchoring (anchor first, price
     after). One price + decision help beats a performative three-tier table. -->
<section class="section" id="oferta" aria-labelledby="oferta-title">
  <div class="container narrow">
    <h2 id="oferta-title" class="section-title">{{copy.offer.title}}</h2>
    <p class="section-sub">{{copy.offer.subtitle}}</p>
    <div class="offer-card">
      <p class="offer-price">{{copy.offer.priceLabel}}</p>
      <p class="offer-note">{{copy.offer.priceNote}}</p>
      <a class="btn btn-primary" href="{{copy.offer.ctaHref}}">{{copy.offer.ctaLabel}}</a>
    </div>
  </div>
</section>
