<!-- Fold 3 — SOLUTION / BENEFITS. Benefits, not features; max 3 primary items
     (cognitive-load cap). Each card: outcome in the user's language. -->
<section class="section" id="solucao" aria-labelledby="solucao-title">
  <div class="container">
    <h2 id="solucao-title" class="section-title">{{copy.solution.title}}</h2>
    <p class="section-sub">{{copy.solution.subtitle}}</p>
    <div class="benefits">
      <article class="benefit">
        <h3>{{copy.solution.benefits.0.title}}</h3>
        <p>{{copy.solution.benefits.0.description}}</p>
      </article>
      <article class="benefit">
        <h3>{{copy.solution.benefits.1.title}}</h3>
        <p>{{copy.solution.benefits.1.description}}</p>
      </article>
      <article class="benefit">
        <h3>{{copy.solution.benefits.2.title}}</h3>
        <p>{{copy.solution.benefits.2.description}}</p>
      </article>
    </div>
  </div>
</section>
