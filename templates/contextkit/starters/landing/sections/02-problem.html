<!-- Fold 2 — PROBLEM / AGITATION. Name the pain as the visitor feels it (loss
     aversion). Darker surface by design (styles/components.css .section-dark). -->
<section class="section section-dark" id="problema" aria-labelledby="problema-title">
  <div class="container">
    <h2 id="problema-title" class="section-title">{{copy.problem.title}}</h2>
    <p class="section-sub">{{copy.problem.subtitle}}</p>
    <ul class="pain-list">
      <li>{{copy.problem.items.0}}</li>
      <li>{{copy.problem.items.1}}</li>
      <li>{{copy.problem.items.2}}</li>
    </ul>
  </div>
</section>
