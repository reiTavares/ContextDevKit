<!-- Fold 1 — HERO. Promise (≤ 8 words) + sub-promise (objection killer) + ONE CTA
     + ONE real proof. The only fold every visitor sees; one message, one action. -->
<section class="hero" id="top" aria-labelledby="hero-title">
  <div class="container hero-inner">
    <p class="eyebrow">{{copy.hero.eyebrow}}</p>
    <h1 id="hero-title">{{copy.hero.title}}</h1>
    <p class="lede">{{copy.hero.subtitle}}</p>
    <div class="hero-actions">
      <a class="btn btn-primary" href="{{copy.hero.ctaHref}}">{{copy.hero.ctaLabel}}</a>
    </div>
    <p class="hero-proof">{{copy.hero.proof}}</p>
  </div>
</section>
